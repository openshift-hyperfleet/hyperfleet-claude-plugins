name: Track Plugin Usage

on:
  repository_dispatch:
    types: [plugin_usage]

concurrency:
  group: plugin-usage-tracking
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Switch to data branch
        run: |
          if git rev-parse --verify origin/data >/dev/null 2>&1; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
            echo '{"users":{}}' > usage.json
            echo "# HyperFleet Claude Plugin Usage Dashboard" > README.md
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add usage.json README.md
            git commit -m "Initialize data branch"
            git push origin data
          fi

      - name: Update usage data
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const payload = context.payload.client_payload;
            const sanitize = (s) => (s || 'unknown').replace(/[^a-zA-Z0-9@._\-]/g, '');
            const user = sanitize(payload.user);
            const plugin = sanitize(payload.plugin);
            const skill = sanitize(payload.skill);
            const event = sanitize(payload.event);
            const today = new Date().toISOString().split('T')[0];

            // Read existing data
            let data = { users: {} };
            const dataFile = 'usage.json';
            if (fs.existsSync(dataFile)) {
              try {
                data = JSON.parse(fs.readFileSync(dataFile, 'utf8'));
              } catch (e) {
                core.warning(`usage.json is corrupted, reinitializing: ${e.message}`);
                data = { users: {} };
              }
            }

            // Update user entry
            if (!data.users[user]) {
              data.users[user] = {
                first_seen: today,
                last_seen: today,
                total: 0,
                plugins: {}
              };
            }

            const userData = data.users[user];
            userData.last_seen = today;
            userData.total += 1;

            // Aggregate event counts
            userData.events = userData.events || {};
            userData.events[event] = (userData.events[event] || 0) + 1;

            if (!userData.plugins[plugin]) {
              userData.plugins[plugin] = {};
            }
            if (!userData.plugins[plugin][skill]) {
              userData.plugins[plugin][skill] = 0;
            }
            userData.plugins[plugin][skill] += 1;

            // Write updated data
            fs.writeFileSync(dataFile, JSON.stringify(data, null, 2) + '\n');

            // Generate dashboard README
            const users = Object.entries(data.users);
            const totalInstallations = users.length;
            const totalInvocations = users.reduce((sum, [, u]) => sum + u.total, 0);

            // Active users in last 7 days
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            const sevenDaysAgoStr = sevenDaysAgo.toISOString().split('T')[0];
            const activeUsers = users.filter(([, u]) => u.last_seen >= sevenDaysAgoStr).length;

            let readme = `# HyperFleet Claude Plugin Usage Dashboard\n\n`;
            readme += `> Auto-generated by the track-usage workflow. Do not edit manually.\n\n`;
            readme += `## Summary\n\n`;
            readme += `| Metric | Value |\n`;
            readme += `|--------|-------|\n`;
            readme += `| Total Installations | ${totalInstallations} |\n`;
            readme += `| Active Users (7d) | ${activeUsers} |\n`;
            readme += `| Total Invocations | ${totalInvocations} |\n\n`;

            readme += `## Users\n\n`;
            readme += `| User | First Seen | Last Seen | Invocations | Top Plugins |\n`;
            readme += `|------|------------|-----------|-------------|-------------|\n`;

            for (const [userName, u] of users.sort((a, b) => b[1].total - a[1].total)) {
              const topPlugins = Object.entries(u.plugins)
                .map(([p, skills]) => {
                  const count = Object.values(skills).reduce((s, c) => s + c, 0);
                  return { name: p.replace('hyperfleet-', ''), count };
                })
                .sort((a, b) => b.count - a.count)
                .slice(0, 3)
                .map(p => `${p.name} (${p.count})`)
                .join(', ');
              readme += `| ${userName} | ${u.first_seen} | ${u.last_seen} | ${u.total} | ${topPlugins} |\n`;
            }

            readme += `\n## Plugin Breakdown\n\n`;

            // Aggregate by plugin
            const pluginTotals = {};
            for (const [, u] of users) {
              for (const [p, skills] of Object.entries(u.plugins)) {
                if (!pluginTotals[p]) pluginTotals[p] = { total: 0, skills: {} };
                for (const [s, c] of Object.entries(skills)) {
                  pluginTotals[p].total += c;
                  pluginTotals[p].skills[s] = (pluginTotals[p].skills[s] || 0) + c;
                }
              }
            }

            readme += `| Plugin | Invocations | Top Skills |\n`;
            readme += `|--------|-------------|------------|\n`;
            for (const [p, d] of Object.entries(pluginTotals).sort((a, b) => b[1].total - a[1].total)) {
              const displayName = p.replace(/^hyperfleet-/, '');
              const topSkills = Object.entries(d.skills)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3)
                .map(([s, c]) => `${s} (${c})`)
                .join(', ');
              readme += `| ${displayName} | ${d.total} | ${topSkills} |\n`;
            }

            readme += `\n---\n*Last updated: ${new Date().toISOString()}*\n`;

            fs.writeFileSync('README.md', readme);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usage.json README.md
          git diff --cached --quiet || git commit -m "Update usage data"
          git push
